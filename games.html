<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROMPTED — THE 24 TRIBUTES // June Build Contest</title>
<style>
  :root{
    --gold:#f6c66b; --ember:#ff6a1a; --ash:#0a0a0c; --gold-soft:#caa24a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 0%, #1b1207 0%, #0a0a0c 45%, #050506 100%);
    color:#f4efe6; font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif; overflow:hidden;
  }
  #stage{
    position:relative; width:100vw; height:56.25vw;
    max-height:100vh; max-width:177.78vh; margin:auto;
    top:50%; transform:translateY(-50%); overflow:hidden;
  }
  canvas#embers{position:absolute; inset:0; width:100%; height:100%; z-index:1}
  .layer{position:absolute; inset:0; z-index:2; display:flex; align-items:center; justify-content:center}

  /* ---------- Play gate ---------- */
  #gate{
    position:absolute; inset:0; z-index:8; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3vh; cursor:pointer;
    background:radial-gradient(circle at 50% 40%, rgba(255,106,26,.08), rgba(5,5,6,.92));
  }
  #gate .g-kicker{font-size:1.4vw; letter-spacing:.6em; text-transform:uppercase; color:var(--gold-soft)}
  #gate .g-title{
    font-size:6vw; font-weight:900; color:var(--gold); letter-spacing:.04em; text-align:center; line-height:.95;
    text-shadow:0 0 28px rgba(246,198,107,.35), 0 0 70px rgba(255,106,26,.25);
  }
  #gate .g-play{
    margin-top:1vh; font-size:1.6vw; letter-spacing:.25em; text-transform:uppercase;
    color:var(--ash); background:var(--gold); padding:1.4vh 3vw; border-radius:10px;
    box-shadow:0 0 30px rgba(246,198,107,.5); animation:beat 1.8s ease-in-out infinite;
  }
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  /* ---------- Intro ---------- */
  #intro{flex-direction:column; gap:2.2vh; text-align:center}
  #intro .kicker{font-size:1.6vw; letter-spacing:.7em; text-transform:uppercase; color:var(--gold-soft); opacity:0; transform:translateY(14px)}
  #intro .title{
    font-size:7vw; font-weight:900; letter-spacing:.04em; line-height:.95; color:var(--gold);
    text-shadow:0 0 28px rgba(246,198,107,.35), 0 0 70px rgba(255,106,26,.25); opacity:0; transform:scale(.92);
  }
  #intro .sub{font-size:1.5vw; letter-spacing:.45em; text-transform:uppercase; color:#cfc4b0; opacity:0}
  .anim-kicker{animation:rise .9s ease forwards .2s}
  .anim-title{animation:pop 1.1s cubic-bezier(.2,.8,.2,1) forwards .5s}
  .anim-sub{animation:fade 1s ease forwards 1.3s}

  /* ---------- Tribute card ---------- */
  #card-layer{perspective:1200px}
  .card{
    position:relative; width:34vw; max-width:560px; aspect-ratio:16/10;
    background:linear-gradient(160deg,#1d1a14 0%,#100f0c 100%); border:1px solid rgba(246,198,107,.35);
    border-radius:16px; padding:3.2vh 3vw; display:grid; grid-template-columns:auto 1fr; gap:2.4vw; align-items:center;
    box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 30px 80px rgba(0,0,0,.7), inset 0 0 60px rgba(255,106,26,.06); opacity:0;
  }
  .card.show{animation:cardIn 2.6s cubic-bezier(.16,.84,.24,1) forwards}
  .card .frame{
    width:11vw; max-width:170px; aspect-ratio:1; border-radius:14px; overflow:hidden;
    border:2px solid var(--gold); flex:none; position:relative; box-shadow:0 0 30px rgba(246,198,107,.3);
    background:linear-gradient(135deg,#2a2118,#0c0b09);
  }
  .card .frame img{width:100%; height:100%; object-fit:cover; display:block}
  .card .frame .initials{width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:3.4vw; font-weight:900; color:var(--gold); background:radial-gradient(circle at 40% 30%, #3a2c16, #120d07)}
  .card .portrait-col{display:flex; flex-direction:column; align-items:center; gap:1.1vh; min-width:0}
  .card .district{background:var(--ash); border:1px solid var(--gold); color:var(--gold); font-size:.95vw;
    letter-spacing:.2em; padding:.45vh 1vw; border-radius:8px; text-transform:uppercase; white-space:nowrap}
  .card .meta{min-width:0}
  .card .meta .rank{font-size:1.1vw; letter-spacing:.35em; color:var(--ember); text-transform:uppercase}
  .card .meta .name{font-size:3.1vw; font-weight:900; line-height:1.02; margin:.4vh 0; color:#fff;
    overflow-wrap:anywhere; word-break:break-word}
  .card .meta .handle{font-size:1.3vw; color:var(--gold-soft)}
  .card .meta .pts{margin-top:1.4vh; font-size:1.25vw; color:#e9dcc0; letter-spacing:.06em}
  .card .meta .pts b{color:var(--gold); font-size:1.7vw}

  /* ---------- Final grid ---------- */
  #grid-layer{flex-direction:column; gap:2.4vh; opacity:0}
  #grid-layer.show{animation:fade 1.1s ease forwards}
  #grid-layer .gtitle{font-size:3.4vw; font-weight:900; color:var(--gold); letter-spacing:.05em; text-align:center;
    text-shadow:0 0 30px rgba(255,106,26,.3)}
  .grid{display:grid; grid-template-columns:repeat(8,1fr); gap:.9vw; width:84vw; max-width:1500px}
  .cell{position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; border:1px solid rgba(246,198,107,.3);
    background:#15110a; opacity:0; transform:scale(.6)}
  .cell.in{animation:cellPop .5s cubic-bezier(.2,.8,.2,1) forwards}
  .cell img{width:100%; height:100%; object-fit:cover}
  .cell .ini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--gold);
    font-size:1.6vw; background:radial-gradient(circle at 40% 30%, #3a2c16, #120d07)}
  .cell .nm{position:absolute;bottom:0;left:0;right:0;font-size:.62vw;text-align:center;
    background:linear-gradient(transparent,rgba(0,0,0,.85));color:#fff;padding:.8vh .2vw .4vh;letter-spacing:.04em}
  .cell-link{display:block;width:100%;height:100%;cursor:pointer}
  .cell .tip{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:.2vh;background:rgba(8,6,4,.92);text-align:center;padding:.4vh;
    opacity:0;pointer-events:none;transition:opacity .15s;backdrop-filter:blur(2px);z-index:4}
  .cell:hover .tip{opacity:1}
  .cell .tip .tipbig{font-size:.74vw;font-weight:700;color:var(--gold);line-height:1.3}
  .cell .tip .tipsub{font-size:.58vw;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);margin-top:.3vh}
  .card .frame a{display:block;width:100%;height:100%}
  .card .meta .contest{margin-top:1vh;font-size:1.05vw;color:var(--gold-soft);letter-spacing:.04em}
  #grid-layer .odds{font-size:1.5vw; letter-spacing:.4em; color:#cfc4b0; text-transform:uppercase}

  /* ---------- Nav + controls ---------- */
  #nav{position:absolute; top:12px; left:14px; z-index:9; display:flex; gap:.6vh}
  #nav a{background:rgba(20,16,9,.8); color:var(--gold); border:1px solid var(--gold-soft);
    font-family:inherit; font-size:1.5vh; letter-spacing:.1em; text-transform:uppercase; padding:.7vh 1.2vh;
    border-radius:8px; text-decoration:none; backdrop-filter:blur(4px)}
  #nav a:hover{background:rgba(246,198,107,.15)}
  #ui{position:absolute; z-index:9; right:2vh; bottom:2vh; display:flex; gap:1vh}
  #ui button{background:rgba(20,16,9,.8); color:var(--gold); border:1px solid var(--gold-soft);
    font:inherit; font-size:1.4vh; letter-spacing:.1em; text-transform:uppercase; padding:1vh 1.6vh; border-radius:8px;
    cursor:pointer; backdrop-filter:blur(4px)}
  #ui button:hover{background:rgba(246,198,107,.15)}
  #speed-wrap{display:flex; align-items:center; gap:1vh; background:rgba(20,16,9,.8);
    color:var(--gold-soft); border:1px solid var(--gold-soft); border-radius:8px; padding:1vh 1.4vh;
    font-size:1.4vh; letter-spacing:.1em; backdrop-filter:blur(4px)}
  #speed-wrap input[type=range]{width:12vh; accent-color:var(--gold); cursor:pointer}
  #speed-val{color:var(--gold); min-width:3.4ch; text-align:right}
  .hidden{display:none !important}

  @keyframes rise{to{opacity:1; transform:translateY(0)}}
  @keyframes pop{0%{opacity:0;transform:scale(.92)}60%{opacity:1;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  @keyframes fade{to{opacity:1}}
  @keyframes cardIn{
    0%{opacity:0; transform:translateX(60px) rotateY(-18deg) scale(.95)}
    14%{opacity:1; transform:translateX(0) rotateY(0) scale(1)}
    86%{opacity:1; transform:translateX(0) rotateY(0) scale(1)}
    100%{opacity:0; transform:translateX(-60px) rotateY(18deg) scale(.95)}
  }
  @keyframes cellPop{to{opacity:1; transform:scale(1)}}
</style>
</head>

/* ---- Music: drop a file you have the rights to next to this page.
   Plays when the user hits Play. '' disables it. See note in chat re: licensing. ---- */
const MUSIC = 'HangingTree.mp3';
const MUSIC_VOLUME = 55;   // 0–100
const MUSIC_FADE = 3;      // seconds to fade in

const initials = n => n.replace(/[^A-Za-z ]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
/* ---- Per-builder contest stats (June $1000 community): builds posted + likes those builds earned ---- */
const STATS = {
  vision:{posts:32,likes:398}, thebuilderx:{posts:11,likes:137}, ktb:{posts:8,likes:70},
  netskrip:{posts:7,likes:63}, chlo:{posts:6,likes:75}, akshdeeps_001:{posts:5,likes:51},
  sasam:{posts:4,likes:49}, mollie:{posts:3,likes:40}, mouse:{posts:3,likes:38},
  m18ad:{posts:3,likes:37}, ugxships:{posts:2,likes:25}, cannamuffinman:{posts:2,likes:23},
  minddefinitive:{posts:2,likes:19}, kennethics:{posts:1,likes:14}, josephjbassey:{posts:1,likes:12},
  adex_berry:{posts:1,likes:12}, vicdengineeer:{posts:1,likes:8}, shiroku_official:{posts:1,likes:6},
};
const stat = h => STATS[h] || {posts:0, likes:0};
const profileUrl = h => 'https://prmpted.com/' + h;

const imgHtml = t => t.avatar
  ? `<img src="${t.avatar}" alt="" onerror="this.outerHTML='<div class=&quot;initials&quot;>${initials(t.name)}</div>'">`
  : `<div class="initials">${initials(t.name)}</div>`;
/* portrait is clickable → opens the builder's Prompted profile (Buttercup has none) */
const portrait = t => t.isCat
  ? imgHtml(t)
  : `<a class="plink" href="${profileUrl(t.handle)}" target="_blank" rel="noopener" title="View @${t.handle} on Prompted">${imgHtml(t)}</a>`;

/* ---- Ember particle field ---- */
const cv = document.getElementById('embers'), cx = cv.getContext('2d');
let W,H,parts=[];
function resize(){const r=cv.getBoundingClientRect();W=cv.width=r.width;H=cv.height=r.height;}
new ResizeObserver(resize).observe(cv); resize();
for(let i=0;i<90;i++) parts.push(spawn(true));
function spawn(init){return{x:Math.random()*W, y:init?Math.random()*H:H+10,
  r:Math.random()*2.4+0.6, vy:-(Math.random()*0.8+0.3), vx:(Math.random()-.5)*0.4,
  a:Math.random()*0.6+0.2, tw:Math.random()*0.04+0.01};}
function tick(){
  cx.clearRect(0,0,W,H);
  for(let p of parts){
    p.y+=p.vy; p.x+=p.vx; p.a+=Math.sin(Date.now()*p.tw)*0.003;
    if(p.y<-10){Object.assign(p,spawn(false));}
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,7);
    cx.fillStyle=`rgba(255,${140+Math.random()*60|0},40,${Math.max(0,p.a)})`;
    cx.shadowColor='rgba(255,120,30,.9)'; cx.shadowBlur=12; cx.fill();
  }
  requestAnimationFrame(tick);
}
tick();

/* ---- Background music ---- */
let musicEl = null;
function startMusic(){
  if(!MUSIC) return;
  musicEl = new Audio(MUSIC);
  musicEl.loop = true;
  musicEl.volume = 0;
  musicEl.play().then(()=>{
    const target = MUSIC_VOLUME/100, t0 = performance.now();
    (function fade(){
      const f = Math.min((performance.now()-t0)/(MUSIC_FADE*1000), 1);
      musicEl.volume = target*f;
      if(f<1) requestAnimationFrame(fade);
    })();
  }).catch(()=>{ /* no file / blocked — animation still runs silently */ });
}

/* ---- Sequence ---- */
const gate=document.getElementById('gate');
const intro=document.getElementById('intro');
const cardLayer=document.getElementById('card-layer');
const gridLayer=document.getElementById('grid-layer');
const gridEl=document.getElementById('grid');
const ui=document.getElementById('ui');
const BASE_MS=2600;            // card duration at 1.0× speed
let speedMult=1;               // driven by the speed slider
const cardMs=()=>BASE_MS/speedMult;
let timers=[];
const clearTimers=()=>{timers.forEach(clearTimeout);timers=[];};
const wait=(fn,ms)=>timers.push(setTimeout(fn,ms));

function buildGrid(){
  gridEl.innerHTML = TRIBUTES.map(t=>{
    const s=stat(t.handle);
    const tip = t.isCat
      ? `<span class="tipbig">🐾 District 13</span><span class="tipsub">off the books</span>`
      : `<span class="tipbig">📦 ${s.posts} build${s.posts===1?'':'s'}</span>`
       +`<span class="tipbig">❤️ ${s.likes} like${s.likes===1?'':'s'}</span>`
       +`<span class="tipsub">this contest</span>`;
    const media = t.isCat ? imgHtml(t)
      : `<a class="cell-link" href="${profileUrl(t.handle)}" target="_blank" rel="noopener">${imgHtml(t)}</a>`;
    return `<div class="cell">${media}<div class="nm">${t.name}</div><div class="tip">${tip}</div></div>`;
  }).join('');
  [...gridEl.querySelectorAll('.cell .initials')].forEach(ini=>ini.classList.replace('initials','ini'));
}
buildGrid();

function showCard(i){
  if(i>=TRIBUTES.length){ showGrid(); return; }
  const t=TRIBUTES[i];
  const c=document.createElement('div');
  c.className='card';
  const district = Math.floor(i/2)+1;
  const s = stat(t.handle);
  const rankText = district===13 ? 'District 13 · Classified' : `Tribute ${i+1} of 24`;
  const contestLine = t.isCat
    ? `<div class="contest">🐾 Resident arena cat</div>`
    : `<div class="contest">📦 ${s.posts} build${s.posts===1?'':'s'} · ❤️ ${s.likes} like${s.likes===1?'':'s'} this contest</div>`;
  c.innerHTML=`
    <div class="portrait-col">
      <div class="district">District ${String(district).padStart(2,'0')}</div>
      <div class="frame">${portrait(t)}</div>
    </div>
    <div class="meta">
      <div class="rank">${rankText}</div>
      <div class="name">${t.name}</div>
      <div class="handle">@${t.handle}</div>
      <div class="pts"><b>${t.pts.toLocaleString()}</b> Builder Points</div>
      ${contestLine}
    </div>`;
  c.style.animationDuration = cardMs()+'ms';   // keep fly-in synced to slide time
  cardLayer.innerHTML=''; cardLayer.appendChild(c);
  requestAnimationFrame(()=>c.classList.add('show'));
  wait(()=>showCard(i+1), cardMs());
}

function showGrid(){
  cardLayer.classList.add('hidden');
  gridLayer.classList.remove('hidden');
  requestAnimationFrame(()=>gridLayer.classList.add('show'));
  [...gridEl.children].forEach((cell,i)=> wait(()=>cell.classList.add('in'), i*90));
}

function runIntro(){
  clearTimers();
  cardLayer.classList.add('hidden'); cardLayer.innerHTML='';
  gridLayer.classList.add('hidden'); gridLayer.classList.remove('show');
  [...gridEl.children].forEach(c=>c.classList.remove('in'));
  intro.classList.remove('hidden');
  intro.querySelector('.kicker').className='kicker anim-kicker';
  intro.querySelector('.title').className='title anim-title';
  intro.querySelector('.sub').className='sub anim-sub';
  wait(()=>{ intro.classList.add('hidden'); cardLayer.classList.remove('hidden'); showCard(0); }, 3200);
}

/* play gate — first gesture unlocks audio + starts the show */
gate.addEventListener('click', ()=>{
  gate.classList.add('hidden');
  ui.classList.remove('hidden');
  startMusic();
  runIntro();
});

const speedEl=document.getElementById('speed'), speedVal=document.getElementById('speed-val');
speedEl.addEventListener('input', ()=>{
  speedMult = speedEl.value/100;
  speedVal.textContent = speedMult.toFixed(1)+'×';
});

document.getElementById('replay').onclick=()=>{
  if(musicEl){ try{ musicEl.currentTime=0; musicEl.play(); }catch(e){} }
  runIntro();
};
document.getElementById('skip').onclick=()=>{clearTimers(); intro.classList.add('hidden'); cardLayer.classList.add('hidden'); showGrid();};
</script>
</body>
</html>
