<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPTED — JUNE CREATOR CONTEST // THE CONSTRUCT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#00ff41;
    --green-dim:#0a8a2c;
    --green-faint:#063d17;
    --bg:#000300;
    --red:#ff2b2b;
    --blue:#3aa0ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--green);
    font-family:'Share Tech Mono','Courier New',monospace;
    font-size:clamp(15px,2vw,20px);
    overflow-x:hidden;
    text-shadow:0 0 6px rgba(0,255,65,.45);
  }

  /* ===== digital rain canvas ===== */
  #rain{
    position:fixed;inset:0;
    z-index:0;
    opacity:.55;
  }
  /* subtle scanline + vignette over everything */
  .overlay::before{
    content:"";position:fixed;inset:0;z-index:5;pointer-events:none;
    background:repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.22) 3px);
  }
  .overlay::after{
    content:"";position:fixed;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 50%,rgba(0,0,0,.85) 100%);
  }

  /* ===== console ===== */
  .console{
    position:relative;z-index:6;
    max-width:980px;margin:0 auto;
    padding:6vh 5vw 10vh;
    min-height:100vh;
  }
  .panel{
    background:rgba(0,8,2,.72);
    border:1px solid var(--green-faint);
    box-shadow:0 0 28px rgba(0,255,65,.08),inset 0 0 60px rgba(0,255,65,.04);
    backdrop-filter:blur(1.5px);
    padding:clamp(18px,4vw,40px);
  }

  .line{white-space:pre-wrap;min-height:1.25em;line-height:1.35;}
  .dim{color:var(--green-dim);text-shadow:0 0 4px rgba(10,138,44,.5);}
  .red{color:var(--red);text-shadow:0 0 8px rgba(255,43,43,.6);}
  .cursor::after{content:"▋";animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* glitchy title */
  .title{
    font-family:'VT323',monospace;
    font-size:clamp(34px,8vw,82px);
    letter-spacing:.04em;line-height:.95;
    margin:.1em 0 .15em;
    position:relative;
    color:var(--green);
  }
  .title[data-text]::before,.title[data-text]::after{
    content:attr(data-text);
    position:absolute;left:0;top:0;width:100%;
    clip-path:inset(0 0 0 0);
    opacity:.65;
  }
  .title[data-text]::before{color:var(--red);animation:glitch 2.6s infinite steps(2);}
  .title[data-text]::after{color:var(--blue);animation:glitch 3.4s infinite reverse steps(2);}
  @keyframes glitch{
    0%,82%,100%{transform:translate(0,0);clip-path:inset(0 0 100% 0);}
    83%{transform:translate(-3px,1px);clip-path:inset(8% 0 60% 0);}
    86%{transform:translate(3px,-1px);clip-path:inset(40% 0 20% 0);}
    89%{transform:translate(-2px,0);clip-path:inset(75% 0 5% 0);}
    92%{transform:translate(2px,1px);clip-path:inset(20% 0 55% 0);}
  }

  .status{
    display:inline-block;padding:.05em .5em;margin-left:.2em;
    border:1px solid var(--green);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 4px rgba(0,255,65,.4);}
    50%{box-shadow:0 0 18px rgba(0,255,65,.95);}
  }

  .bounty{
    font-family:'VT323',monospace;
    font-size:clamp(20px,3.4vw,32px);
    color:var(--green);
    margin:.5em 0 .1em;
  }
  .rule{border:none;border-top:1px solid var(--green-faint);margin:1.1em 0;}

  .prize-row{display:flex;justify-content:space-between;max-width:520px;margin:.1em 0;}
  .prize-row .dots{flex:1;overflow:hidden;white-space:nowrap;color:var(--green-faint);margin:0 .5em;}
  .prize-row .amt{color:var(--green);font-weight:bold;}

  /* roster */
  #roster{margin-top:.3em;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.15em .9em;}
  .op{
    display:grid;grid-template-columns:2.2em 1fr;gap:.6em;align-items:baseline;
    opacity:0;animation:fadein .2s forwards;
  }
  @keyframes fadein{to{opacity:1;}}
  .op .idx{color:var(--green-dim);}
  .op .name{color:var(--green);letter-spacing:.02em;}
  .op .name.locking{color:#bdffce;text-shadow:0 0 10px rgba(0,255,65,.9);}

  /* red pill CTA */
  .pills{margin-top:.6em;display:flex;gap:1em;flex-wrap:wrap;}
  .pill{
    display:inline-block;padding:.3em 1em;text-decoration:none;
    font-family:'VT323',monospace;font-size:clamp(18px,2.6vw,26px);
    letter-spacing:.06em;text-shadow:none;
  }
  .pill-red{
    color:#fff;background:var(--red);
    box-shadow:0 0 16px rgba(255,43,43,.7);
    animation:pulse-red 1.6s ease-in-out infinite;
  }
  @keyframes pulse-red{
    0%,100%{box-shadow:0 0 8px rgba(255,43,43,.5);}
    50%{box-shadow:0 0 22px rgba(255,43,43,1);}
  }
  .pill-red:hover,.pill-red:focus-visible{outline:2px solid #fff;outline-offset:3px;}
  .pill-blue{
    color:var(--blue);background:transparent;border:1px solid var(--blue);
    text-shadow:0 0 8px rgba(58,160,255,.5);
  }
  .pill-blue:hover,.pill-blue:focus-visible{background:rgba(58,160,255,.12);}

  /* sound toggle */
  #snd{
    position:fixed;top:12px;right:14px;z-index:20;
    background:transparent;color:var(--green-dim);
    border:1px solid var(--green-faint);
    font-family:inherit;font-size:.75em;padding:.25em .7em;cursor:pointer;text-shadow:none;
  }
  #snd:hover,#snd:focus-visible{color:var(--green);border-color:var(--green);outline:none;}

  /* page switch */
  #switch{
    position:fixed;top:12px;left:14px;z-index:31;
    background:transparent;color:var(--green-dim);
    border:1px solid var(--green-faint);
    font-family:inherit;font-size:.75em;padding:.25em .7em;
    text-decoration:none;text-shadow:none;
  }
  #switch:hover,#switch:focus-visible{color:var(--green);border-color:var(--green);outline:none;}

  #gate{
    position:fixed;inset:0;z-index:30;
    display:flex;align-items:center;justify-content:center;text-align:center;
    background:rgba(0,3,0,.82);
    font-family:'VT323',monospace;font-size:clamp(22px,4vw,38px);
    color:var(--green);cursor:pointer;
  }

  @media (prefers-reduced-motion:reduce){
    .title[data-text]::before,.title[data-text]::after,
    .status,.pill-red,.cursor::after{animation:none;}
    .op{opacity:1;animation:none;}
  }
</style>
</head>
<body class="overlay">
<canvas id="rain"></canvas>

<div style="position:fixed;top:12px;left:14px;z-index:20;display:flex;gap:8px;align-items:center;">
  <a id="switch" href="index.html" style="position:static;">▸ TERMINAL MODE</a>
  <a href="games.html" style="position:static;background:transparent;color:var(--blue);border:1px solid var(--blue);font-family:inherit;font-size:.7em;padding:.2em .6em;text-decoration:none;text-shadow:none;">▶ PROMPTED GAMES</a>
</div>
<button id="snd">SOUND: ON</button>

<div class="console">
  <div class="panel" id="panel"></div>
</div>

<div id="gate">▶ CLICK TO ENTER THE CONSTRUCT</div>

<script>
/* ================================================================
   ROSTER — keep this in sync with index.html
   ================================================================ */
const CONTACTS = [
  "@herz", "@vision", "@hartgallery", "@chlo", "@minddefinitive",
  "@user_9689a9c1", "@asym_alwali", "@ktb", "@akshdeeps_001",
  "@thebuilderx", "@joyston", "@mollie", "@sovari", "@shiroku_official",
  "@kennethics", "@cannamuffinman", "@vicdengineeer", "@flybylaw",
  "@adex_berry", "@adejoke", "@imcaffiene", "@ulegend", "@hartgallerydoggo",
  "@sasam", "@fayfay", "@gamingtronium", "@cryptofreak", "@ugxships",
  "@anitanft", "@peperon", "@m18ad", "@chaoho554", "@abdul",
  "@netskrip", "@josephjbassey", "@zicsmartt", "@vnua"
];

const DEADLINE  = new Date('2026-06-30T23:59:59').getTime();
const ENTRY_URL = 'https://www.prmpted.com/community/june-1000-creator-of-the-month';
const MUSIC = 'BackgroundmusicMatrix.mp3';
const MUSIC_VOLUME = 0.12;
const MUSIC_START = 23;   // seconds — where playback (and each loop) begins

const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ---------------- digital rain ---------------- */
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
const GLYPHS = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピ0123456789@#$%&'.split('');
let cols, drops, fontSize = 16;

function sizeRain(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  fontSize = innerWidth < 600 ? 13 : 16;
  cols = Math.floor(canvas.width / fontSize);
  drops = Array.from({length: cols}, () => Math.floor(Math.random() * -50));
}
sizeRain();
addEventListener('resize', sizeRain);

function drawRain(){
  ctx.fillStyle = 'rgba(0,3,0,0.08)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontSize + "px 'Share Tech Mono', monospace";
  for(let i = 0; i < cols; i++){
    const g = GLYPHS[(Math.random() * GLYPHS.length) | 0];
    const x = i * fontSize, y = drops[i] * fontSize;
    ctx.fillStyle = '#bdffce';            // bright leading glyph
    ctx.fillText(g, x, y);
    ctx.fillStyle = 'rgba(0,255,65,0.75)';// trailing green
    ctx.fillText(g, x, y - fontSize);
    if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
if(!reduced) setInterval(drawRain, 55);
else { ctx.fillStyle = 'rgba(0,3,0,1)'; ctx.fillRect(0,0,canvas.width,canvas.height); }

/* ---------------- audio (reuse BackgroundMusic.mp3) ---------------- */
let musicEl = null, muted = false;
const sndBtn = document.getElementById('snd');
sndBtn.onclick = e => {
  e.stopPropagation();
  muted = !muted;
  sndBtn.textContent = muted ? 'SOUND: OFF' : 'SOUND: ON';
  if(musicEl) musicEl.muted = muted;
};
function startMusic(){
  if(!MUSIC) return;
  /* #t= starts playback at the offset even before metadata loads */
  musicEl = new Audio(MUSIC + '#t=' + MUSIC_START);
  musicEl.volume = MUSIC_VOLUME;
  musicEl.muted = muted;
  /* loop back to MUSIC_START (not 0) so the intro never replays */
  musicEl.addEventListener('ended', () => { musicEl.currentTime = MUSIC_START; musicEl.play().catch(()=>{}); });
  musicEl.play().catch(()=>{});
}

/* ---------------- console engine ---------------- */
const panel = document.getElementById('panel');
function newLine(cls=''){
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  panel.appendChild(d);
  return d;
}
async function typeText(el, text, speed=26){
  if(reduced){ el.textContent += text; return; }
  el.classList.add('cursor');
  for(const ch of text){
    el.textContent += ch;
    await sleep(speed + Math.random()*30);
  }
  el.classList.remove('cursor');
}
function pad(n){ return String(n).padStart(2,'0'); }

/* decode one name out of random glyphs, locking left→right */
function decodeName(el, target){
  return new Promise(res => {
    if(reduced){ el.textContent = target; res(); return; }
    let locked = 0;
    const ticks = 3; // scramble frames per locked char
    let frame = 0;
    const iv = setInterval(() => {
      let out = target.slice(0, locked);
      for(let i = locked; i < target.length; i++){
        out += GLYPHS[(Math.random() * GLYPHS.length) | 0];
      }
      el.textContent = out;
      frame++;
      if(frame >= ticks){
        frame = 0; locked++;
        if(locked > target.length){
          clearInterval(iv);
          el.textContent = target;
          el.classList.remove('locking');
          res();
        }
      }
    }, 28);
    el.classList.add('locking');
  });
}

async function run(){
  startMusic();

  // Matrix homage intro
  const boot = newLine('dim');
  await typeText(boot, 'Wake up, creator...', 55);
  await sleep(500);
  boot.textContent = '';
  await typeText(boot, 'The contest has you.', 55);
  await sleep(500);
  boot.textContent = '';
  await typeText(boot, 'Follow the green code.', 45);
  await sleep(700);
  newLine();

  // title
  const eyebrow = newLine('dim');
  await typeText(eyebrow, 'PROMPTED // OPERATOR DISPATCH — THE CONSTRUCT', 22);
  const h1 = newLine('title');
  h1.setAttribute('data-text', 'JUNE CREATOR CONTEST');
  await typeText(h1, 'JUNE CREATOR CONTEST', 38);

  const st = newLine();
  await typeText(st, 'SIGNAL: ', 24);
  const badge = document.createElement('span');
  badge.className = 'status';
  badge.textContent = 'TRANSMITTING';
  st.appendChild(badge);
  await sleep(350);

  const bounty = newLine('bounty');
  await typeText(bounty, 'BOUNTY POOL ▸ $1,000 USD', 30);
  panel.appendChild(Object.assign(document.createElement('hr'),{className:'rule'}));

  const prizes = [['FIRST PLACE','$600'],['SECOND PLACE','$300'],['THIRD PLACE','$100']];
  for(const [label, amt] of prizes){
    const row = document.createElement('div');
    row.className = 'prize-row line';
    row.innerHTML = `<span>${label}</span><span class="dots">......................................................</span><span class="amt">${amt}</span>`;
    panel.appendChild(row);
    if(!reduced) await sleep(380);
  }
  panel.appendChild(Object.assign(document.createElement('hr'),{className:'rule'}));

  // roster decrypt
  const rHead = newLine();
  await typeText(rHead, `>> DECRYPTING REGISTERED OPERATORS // ${CONTACTS.length} SIGNALS LOCATED`, 22);
  newLine();
  const roster = document.createElement('div');
  roster.id = 'roster';
  panel.appendChild(roster);

  for(let i = 0; i < CONTACTS.length; i++){
    const op = document.createElement('div');
    op.className = 'op';
    const idx = document.createElement('span'); idx.className = 'idx'; idx.textContent = pad(i+1);
    const name = document.createElement('span'); name.className = 'name';
    op.append(idx, name);
    roster.appendChild(op);
    decodeName(name, CONTACTS[i]);          // run decode (don't await — let them cascade)
    if(!reduced) await sleep(110);
  }
  if(!reduced) await sleep(900);

  // finale
  panel.appendChild(Object.assign(document.createElement('hr'),{className:'rule'}));
  const f = newLine();
  await typeText(f, `>> ${CONTACTS.length} OPERATORS JACKED IN. THE CONTRACT IS LIVE.`, 26);

  const cd = newLine();
  function tick(){
    const diff = DEADLINE - Date.now();
    if(diff <= 0){ cd.innerHTML = '>> WINDOW CLOSES IN: <span class="red">CLOSED</span>'; return; }
    const s = Math.floor(diff/1000);
    const dd = Math.floor(s/86400), hh = pad(Math.floor(s%86400/3600)),
          mm = pad(Math.floor(s%3600/60)), ss = pad(s%60);
    cd.innerHTML = `>> WINDOW CLOSES IN: <span style="color:#bdffce">${dd}D ${hh}H ${mm}M ${ss}S</span>`;
    setTimeout(tick, 1000);
  }
  tick();

  const pills = document.createElement('div');
  pills.className = 'pills';
  const red = document.createElement('a');
  red.href = ENTRY_URL; red.className = 'pill pill-red'; red.textContent = '⬤ TAKE THE RED PILL';
  const blue = document.createElement('a');
  blue.href = 'index.html'; blue.className = 'pill pill-blue'; blue.textContent = '○ BLUE PILL';
  pills.append(red, blue);
  panel.appendChild(pills);
  const note = newLine('dim');
  note.textContent = '   red pill → transmit your entry   //   blue pill → back to terminal';
}

/* gesture gate (unlocks audio) */
const gate = document.getElementById('gate');
let started = false;
function start(){
  if(started) return; started = true;
  gate.remove();
  run();
}
gate.addEventListener('click', start);
addEventListener('keydown', start, { once:true });
</script>
</body>
</html>
